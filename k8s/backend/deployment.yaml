apiVersion: apps/v1
kind: Deployment
metadata:
  name: netscope-backend
  namespace: network-observability
  labels:
    app: netscope-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netscope-backend
  template:
    metadata:
      labels:
        app: netscope-backend
    spec:
      containers:
        - name: backend
          image: netscope/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring:9090"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: netscope-secrets
                  key: jwt-secret
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: netscope-backend
  namespace: network-observability
spec:
  selector:
    app: netscope-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
